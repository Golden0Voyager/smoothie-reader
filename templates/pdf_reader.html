    /* ========== ChatStore (IndexedDB) ========== */
    const ChatStore = {
        _db: null,
        init() {
            return new Promise(resolve => {
                const req = indexedDB.open('reader3_chat', 1);
                req.onupgradeneeded = e => { e.target.result.createObjectStore('messages', { keyPath: 'bookId' }); };
                req.onsuccess = e => { ChatStore._db = e.target.result; resolve(); };
                req.onerror = () => resolve();
            });
        },
        save(bookId, data) {
            if (!this._db) return;
            try { const tx = this._db.transaction('messages', 'readwrite'); tx.objectStore('messages').put({ bookId, messages: data, updated: Date.now() }); } catch(e) {}
        },
        load(bookId) {
            if (!this._db) return Promise.resolve(null);
            return new Promise(resolve => {
                try {
                    const tx = this._db.transaction('messages', 'readonly');
                    const req = tx.objectStore('messages').get(bookId);
                    req.onsuccess = () => resolve(req.result?.messages || null);
                    req.onerror = () => resolve(null);
                } catch(e) { resolve(null); }
            });
        },
        remove(bookId) { if (!this._db) return; try { this._db.transaction('messages', 'readwrite').objectStore('messages').delete(bookId); } catch(e) {} }
    };

    /* ========== AI Module ========== */
    const AI = {
        _streaming: false,
        _sessions: [],
        _activeId: 0,
        _messages: [],
        _sessionId: 0,
        _msgId: 0,
        _context: '',

        _currentSession() { return this._sessions.find(s => s.id === this._activeId); },
        _ensureSession() {
            if (!this._activeId || !this._currentSession()) {
                const session = { id: ++this._sessionId, title: '', messages: [], created: Date.now() };
                this._sessions.push(session);
                this._activeId = session.id;
                this._messages = session.messages;
            }
        },
        _persist() {
            ChatStore.save(`pdf_${BOOK_ID}`, { sessions: this._sessions, activeId: this._activeId });
        },
        _addContext(text) {
            this._context = text;
            const history = document.getElementById('ai-chat-history');
            document.getElementById('ai-empty-state').style.display = 'none';
            const div = document.createElement('div');
            div.className = 'chat-bubble context';
            div.textContent = text.length > 200 ? text.substring(0, 200) + '...' : text;
            history.appendChild(div);
            document.getElementById('ai-content').scrollTop = document.getElementById('ai-content').scrollHeight;
        },
        _addDelBtn(bubble, msgId) {
            const bar = document.createElement('div');
            bar.className = 'msg-bar';
            const delBtn = document.createElement('button');
            delBtn.title = t('Delete');
            delBtn.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>';
            delBtn.onclick = () => this.deleteMessage(msgId);
            bar.appendChild(delBtn);
            bubble.appendChild(bar);
            bubble.dataset.msgId = msgId;
        },
        _saveMsg(role, html) {
            this._ensureSession();
            const msg = { id: ++this._msgId, role, html, ts: Date.now() };
            this._messages.push(msg);
            const session = this._currentSession();
            if (session && !session.title && role === 'user') {
                const text = html.replace(/<[^>]*>/g, '');
                session.title = text.length > 25 ? text.substring(0, 25) + '...' : text;
            }
            this._persist();
            return msg;
        },
        async send() {
            const input = document.getElementById('ai-input');
            const question = input.value.trim();
            if (!question || this._streaming) return;

            const history = document.getElementById('ai-chat-history');
            document.getElementById('ai-empty-state').style.display = 'none';

            // User bubble
            const userMsg = this._saveMsg('user', question);
            const userDiv = document.createElement('div');
            userDiv.className = 'chat-bubble user';
            userDiv.textContent = question;
            this._addDelBtn(userDiv, userMsg.id);
            history.appendChild(userDiv);

            input.value = ''; input.style.height = 'auto';

            // AI bubble (streaming)
            const aiDiv = document.createElement('div');
            aiDiv.className = 'chat-bubble ai';
            aiDiv.innerHTML = '<span style="opacity:0.5">...</span>';
            history.appendChild(aiDiv);
            const content = document.getElementById('ai-content');
            content.scrollTop = content.scrollHeight;

            this._streaming = true;
            let fullText = '';
            try {
                const resp = await fetch('/api/ai/chat-context', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question, context: this._context, title: BOOK_TITLE })
                });
                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    fullText += decoder.decode(value, { stream: true });
                    const cleaned = fullText.replace(/\n<!--model:.*?-->$/s, '');
                    aiDiv.innerHTML = _md(cleaned);
                    content.scrollTop = content.scrollHeight;
                }
            } catch (e) {
                fullText = `错误: ${e.message}`;
                aiDiv.innerHTML = fullText;
            }

            const cleanedFinal = fullText.replace(/\n<!--model:.*?-->$/s, '');
            const aiMsg = this._saveMsg('ai', _md(cleanedFinal));
            this._addDelBtn(aiDiv, aiMsg.id);

            this._context = '';
            this._streaming = false;
        },
        deleteMessage(msgId) {
            const idx = this._messages.findIndex(m => m.id === msgId);
            if (idx !== -1) this._messages.splice(idx, 1);
            this._persist();
            const el = document.querySelector(`[data-msg-id="${msgId}"]`);
            if (el) { el.style.transition = 'opacity 0.3s, transform 0.3s'; el.style.opacity = '0'; el.style.transform = 'translateX(20px)'; setTimeout(() => el.remove(), 300); }
            const session = this._currentSession();
            if (session && session.messages.length === 0) {
                this._sessions = this._sessions.filter(s => s.id !== session.id);
                this._activeId = 0; this._messages = [];
                this._persist();
                setTimeout(() => { document.getElementById('ai-empty-state').style.display = ''; }, 350);
            }
        },
        clearChat() {
            if (!confirm(t('Clear all chat history?'))) return;
            const session = this._currentSession();
            if (session) {
                this._sessions = this._sessions.filter(s => s.id !== session.id);
                this._activeId = 0; this._messages = [];
            }
            document.getElementById('ai-chat-history').innerHTML = '';
            document.getElementById('ai-empty-state').style.display = '';
            this._persist();
            this._closeSessionList();
        },
        newSession() {
            const current = this._currentSession();
            if (!current || current.messages.length === 0) return;
            this._closeSessionList();
            this._activeId = 0; this._messages = [];
            this._persist();
            document.getElementById('ai-chat-history').innerHTML = '';
            document.getElementById('ai-empty-state').style.display = '';
        },
        switchSession(id) {
            const session = this._sessions.find(s => s.id === id);
            if (!session) return;
            this._activeId = id; this._messages = session.messages;
            document.getElementById('ai-empty-state').style.display = 'none';
            this._closeSessionList();
            this._renderMessages(session.messages);
            this._persist();
        },
        deleteSession(id) {
            if (!confirm(t('Delete this session?'))) return;
            this._sessions = this._sessions.filter(s => s.id !== id);
            if (this._activeId === id) {
                if (this._sessions.length > 0) {
                    const latest = this._sessions[this._sessions.length - 1];
                    this._activeId = latest.id; this._messages = latest.messages;
                    document.getElementById('ai-empty-state').style.display = 'none';
                    this._renderMessages(latest.messages);
                } else {
                    this._activeId = 0; this._messages = [];
                    document.getElementById('ai-chat-history').innerHTML = '';
                    document.getElementById('ai-empty-state').style.display = '';
                }
            }
            this._persist();
            const list = document.getElementById('session-list');
            if (list) { list.remove(); this.showSessionList(); }
        },
        showSessionList() {
            const existing = document.getElementById('session-list');
            if (existing) { this._closeSessionList(); return; }
            const list = document.createElement('div');
            list.id = 'session-list'; list.className = 'session-list';
            if (this._sessions.length === 0) {
                list.innerHTML = `<div class="session-empty">${t('No chat history')}</div>`;
            } else {
                [...this._sessions].sort((a, b) => b.created - a.created).forEach(s => {
                    const isActive = s.id === this._activeId;
                    const d = new Date(s.created);
                    const dateStr = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
                    const item = document.createElement('div');
                    item.className = `session-item${isActive ? ' active' : ''}`;
                    item.onclick = () => AI.switchSession(s.id);
                    item.innerHTML = `<div class="session-title">${s.title || t('New Chat')}</div><div class="session-meta"><span>${dateStr}</span><span>${s.messages.length} ${t('messages')}</span></div><button class="session-del" onclick="event.stopPropagation();AI.deleteSession(${s.id})">×</button>`;
                    list.appendChild(item);
                });
            }
            const panel = document.getElementById('ai-panel');
            const content = document.getElementById('ai-content');
            panel.insertBefore(list, content);
        },
        _closeSessionList() { document.getElementById('session-list')?.remove(); },
        _renderMessages(messages) {
            const history = document.getElementById('ai-chat-history');
            history.innerHTML = '';
            messages.forEach(msg => {
                const bubble = document.createElement('div');
                bubble.className = `chat-bubble ${msg.role}`;
                bubble.innerHTML = msg.html;
                this._addDelBtn(bubble, msg.id);
                history.appendChild(bubble);
            });
            document.getElementById('ai-content').scrollTop = document.getElementById('ai-content').scrollHeight;
        },
        async _restoreChat() {
            await ChatStore.init();
            const data = await ChatStore.load(`pdf_${BOOK_ID}`);
            if (!data) return;
            if (data.sessions) {
                this._sessions = data.sessions;
                this._activeId = data.activeId || 0;
                const allMsgIds = data.sessions.flatMap(s => s.messages.map(m => m.id));
                this._msgId = allMsgIds.length ? Math.max(...allMsgIds) : 0;
                this._sessionId = data.sessions.length ? Math.max(...data.sessions.map(s => s.id)) : 0;
                const active = this._currentSession();
                if (active) {
                    this._messages = active.messages;
                    this._renderMessages(active.messages);
                    document.getElementById('ai-empty-state').style.display = 'none';
                }
            }
        },
        quick(action) {

    const TTS = {
        player: new Audio(),
        rate: '+0%',
        voice: 'zh-CN-XiaoxiaoNeural',
        _speeds: [['-30%','0.7×'],['-15%','0.85×'],['+0%','1×'],['+15%','1.15×'],['+30%','1.3×'],['+50%','1.5×'],['+100%','2×']],
        _voices: [
            { group: 'Mandarin', items: [['zh-CN-XiaoxiaoNeural','Xiaoxiao · F'],['zh-CN-YunxiNeural','Yunxi · M'],['zh-CN-YunyangNeural','Yunyang · M']] },
            { group: 'English · US', items: [['en-US-AvaNeural','Ava · F'],['en-US-AndrewNeural','Andrew · M']] },
            { group: 'English · UK', items: [['en-GB-SoniaNeural','Sonia · F'],['en-GB-RyanNeural','Ryan · M']] }
        ],
        _leaveTimer: null,

        _buildSrc(text) {
            const voice = this._autoVoice(text);
            return `/api/tts?text=${encodeURIComponent(text)}&voice=${voice}&rate=${encodeURIComponent(this.rate)}`;
        },
        _autoVoice(text) {
            const cjk = (text.match(/[\u4e00-\u9fff]/g) || []).length;
            const isCJK = cjk > text.length * 0.15;
            const userIsCJK = this.voice.startsWith('zh-');
            if (isCJK && userIsCJK) return this.voice;
            if (!isCJK && !userIsCJK) return this.voice;
            return isCJK ? 'zh-CN-XiaoxiaoNeural' : 'en-US-AvaNeural';
        },
        speakSelection() {
            const text = Sel._selText;
            if (!text) return;
            this.player.src = this._buildSrc(text.substring(0, 1000));
            this.player.play().catch(() => {});
            document.getElementById('audio-console').classList.add('visible');
            this._updatePlayBtn(true);
        },
        toggleAll() {
            if (!this.player.paused) { this.player.pause(); this._updatePlayBtn(false); }
            else if (this.player.src) { this.player.play().catch(() => {}); this._updatePlayBtn(true); }
        },
        stop() {
            this.player.pause(); this.player.currentTime = 0;
            document.getElementById('audio-console').classList.remove('visible');
            this._updatePlayBtn(false);
        },
        _updatePlayBtn(playing) {
            const btn = document.getElementById('play-main-btn');
            if (playing) btn.innerHTML = '<svg viewBox="0 0 24 24" fill="white" stroke="white"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
            else btn.innerHTML = '<svg viewBox="0 0 24 24" fill="white" stroke="white"><polygon points="7 3 21 12 7 21 7 3"/></svg>';
        },
        setRate(rate) {
            this.rate = rate;
            const idx = this._speeds.findIndex(([r]) => r === rate);
            if (idx >= 0) this._updateSlider(idx);
            if (!this.player.paused && this.player.src) {
                const src = this.player.src.replace(/rate=[^&]*/, `rate=${encodeURIComponent(rate)}`);
                this.player.src = src; this.player.play().catch(() => {});
            }
        },
        showVoiceMenu(btn) {
            const popup = document.getElementById('voice-popup');
            if (popup.classList.contains('visible')) { this._hidePopups(); return; }
            this._hidePopups();

                html += `<div class="ap-group">${t(g.group)}</div>`;

                    const active = this.voice === id ? ' active' : '';
                    html += `<div class="ap-item${active}" data-voice="${id}" onclick="TTS._selectVoice(this,'${id}')"><span>${t(name)}</span><span class="ap-check">✓</span></div>`;

            });
            list.innerHTML = html;

                slider.style.transform = `translateY(${activeItem.offsetTop + 3}px)`;

        },
        _selectVoice(el, voiceId) {
            const list = document.getElementById('voice-popup-list');
            const slider = document.getElementById('voice-slider');
            list.querySelectorAll('.ap-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            slider.style.height = (el.offsetHeight - 6) + 'px';
            slider.style.transform = `translateY(${el.offsetTop + 3}px)`;
            this.voice = voiceId;
        },
        showSpeedMenu(btn) {
            const popup = document.getElementById('speed-popup');
            if (popup.classList.contains('visible')) { this._hidePopups(); return; }
            this._hidePopups();
            const wrap = document.getElementById('speed-slider-wrap');
            const idx = this._speeds.findIndex(([r]) => r === this.rate);
            const pct = (idx / (this._speeds.length - 1)) * 100;
            let labels = '';
            this._speeds.forEach(([rate, label]) => {
                const active = this.rate === rate ? ' active' : '';
                labels += `<span class="speed-label-dot${active}" onclick="TTS.setRate('${rate}')">${label}</span>`;
            });
            wrap.innerHTML = `<div class="speed-track" id="speed-track"><div class="speed-fill" id="speed-fill" style="width:${pct}%"></div><div class="speed-thumb" id="speed-thumb" style="left:${pct}%"></div></div><div class="speed-labels">${labels}</div>`;
            this._showPopup(popup, btn);
            const thumb = document.getElementById('speed-thumb');
            const track = document.getElementById('speed-track');
            const snapTo = (cx) => {
                const rect = track.getBoundingClientRect();
                const ratio = Math.max(0, Math.min(1, (cx - rect.left) / rect.width));
                const nearest = Math.round(ratio * (this._speeds.length - 1));
                this.setRate(this._speeds[nearest][0]);
            };
            thumb.style.cursor = 'grab';
            thumb.onmousedown = (e) => {
                e.preventDefault(); thumb.classList.add('dragging');
                const onMove = (ev) => snapTo(ev.clientX);
                const onUp = () => { thumb.classList.remove('dragging'); window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
                window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onUp);
            };
            track.style.cursor = 'pointer';
            track.onclick = (e) => snapTo(e.clientX);
        },
        _updateSlider(idx) {
            const pct = (idx / (this._speeds.length - 1)) * 100;
            const fill = document.getElementById('speed-fill'), thumb = document.getElementById('speed-thumb');
            if (fill) fill.style.width = pct + '%';
            if (thumb) thumb.style.left = pct + '%';
            document.querySelectorAll('.speed-label-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
        },
        _showPopup(popup, anchor) {
            const rect = anchor.getBoundingClientRect();
            popup.style.visibility = 'hidden'; popup.classList.add('visible');
            const pw = popup.offsetWidth, ph = popup.offsetHeight;
            popup.style.visibility = '';
            let left = rect.left + rect.width / 2 - pw / 2, top = rect.top - ph - 8;
            if (top < 8) top = rect.bottom + 8;
            left = Math.max(8, Math.min(left, window.innerWidth - pw - 8));
            popup.style.left = left + 'px'; popup.style.top = top + 'px';
            setTimeout(() => document.addEventListener('mousedown', this._outsideHandler), 0);
            clearTimeout(this._leaveTimer);
            popup.onmouseleave = () => { this._leaveTimer = setTimeout(() => this._hidePopups(), 900); };
            popup.onmouseenter = () => clearTimeout(this._leaveTimer);
        },
        _hidePopups() {
            clearTimeout(this._leaveTimer);
            document.getElementById('voice-popup').classList.remove('visible');
            document.getElementById('speed-popup').classList.remove('visible');
            document.removeEventListener('mousedown', this._outsideHandler);
        },
        _outsideHandler(e) { if (!e.target.closest('.audio-popup') && !e.target.closest('.player-label')) TTS._hidePopups(); }
    };
    window.TTS = TTS;

    /* ========== Resizable Sidebars ========== */
    function setupResizers() {
        const root = document.documentElement;
        const setup = (id, variable, side, storageKey) => {
            const resizer = document.getElementById(id);
            const panelId = side === 'left' ? 'sidebar' : 'panels-container';
            const panel = document.getElementById(panelId);
            const defaultWidth = side === 'left' ? 260 : 340;
            const snapThreshold = 80;
            const resistStart = 180;
            let dragging = false, lastRaw = 0, lastGoodWidth = null, rafId = 0;

            const applyWidth = () => {
                rafId = 0;
                if (lastRaw < resistStart) {
                    const t = lastRaw / resistStart;
                    const display = resistStart * Math.pow(t, 0.6);
                    root.style.setProperty(variable, display + 'px');
                    resizer.classList.toggle('snap-zone', lastRaw < snapThreshold);
                } else if (lastRaw <= 600) {
                    root.style.setProperty(variable, lastRaw + 'px');
                    localStorage.setItem(storageKey, lastRaw + 'px');
                    lastGoodWidth = lastRaw;
                    resizer.classList.remove('snap-zone');
                }
            };

            const onMove = (e) => {
                if (!dragging) return;
                lastRaw = side === 'left' ? e.clientX : window.innerWidth - e.clientX;
                lastRaw = Math.max(0, lastRaw);
                if (!rafId) rafId = requestAnimationFrame(applyWidth);
            };

            const onEnd = () => {
                dragging = false;
                document.body.classList.remove('is-dragging');
                resizer.classList.remove('snap-zone');
                window.removeEventListener('mousemove', onMove);
                window.removeEventListener('mouseup', onEnd);

                if (lastRaw < snapThreshold) {
                    root.style.setProperty(variable, (lastGoodWidth || defaultWidth) + 'px');
                    panel.classList.add('collapsed');
                    if (side === 'right') document.getElementById('toggle-right').classList.add('rotated');
                } else if (lastRaw < resistStart) {
                    root.style.setProperty(variable, resistStart + 'px');
                    localStorage.setItem(storageKey, resistStart + 'px');
                }
            };

            resizer.onmousedown = (e) => {
                if (panel.classList.contains('collapsed')) {
                    panel.style.transition = 'none';
                    panel.classList.remove('collapsed');
                    root.style.setProperty(variable, '0px');
                    panel.offsetHeight;
                    panel.style.transition = '';
                    if (side === 'right') document.getElementById('toggle-right').classList.remove('rotated');
                }
                lastGoodWidth = parseFloat(localStorage.getItem(storageKey)) || defaultWidth;
                lastRaw = 0;
                dragging = true;
                document.body.classList.add('is-dragging');
                window.addEventListener('mousemove', onMove);
                window.addEventListener('mouseup', onEnd);
                e.preventDefault();
            };
        };
        setup('left-resizer', '--sidebar-width', 'left', 'pdf_sidebar_width');
        setup('right-resizer', '--panels-width', 'right', 'pdf_panels_width');
    }
    if (window.innerWidth > 768) setupResizers();

    let _activePanel = null;
    function togglePanel(name) {
        const panels = { settings: 'settings-panel', search: 'search-panel', notebook: 'notebook-panel' };
        const panelId = panels[name];
        if (!panelId) return;
        if (_activePanel === name) {
            document.getElementById(panelId).style.display = 'none';
            _activePanel = null;
        } else {
            Object.values(panels).forEach(id => document.getElementById(id).style.display = 'none');
            document.getElementById(panelId).style.display = 'block';
            _activePanel = name;
            if (name === 'notebook') { Notebook.renderHighlights(); Notebook.renderBookmarks(); }
            if (name === 'search') document.getElementById('search-input').focus();
        }
    }
    window.togglePanel = togglePanel;

    // Close panels on outside click
    document.addEventListener('mousedown', (e) => {
        if (_activePanel) {
            const panels = { settings: 'settings-panel', search: 'search-panel', notebook: 'notebook-panel' };
            const panelEl = document.getElementById(panels[_activePanel]);
            const toggleGroup = document.querySelector('.toggle-group');
            if (panelEl && !panelEl.contains(e.target) && !toggleGroup.contains(e.target)) {
                panelEl.style.display = 'none';
                _activePanel = null;
            }
        }
    });

    // Mobile overlay
    document.getElementById('mobile-overlay').addEventListener('click', () => {
        document.getElementById('sidebar').classList.remove('mobile-open');
        document.getElementById('panels-container').classList.remove('mobile-open');
        document.getElementById('mobile-overlay').classList.remove('visible');
    });

    // Auto-resize textarea
    document.getElementById('ai-input').addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    /* ========== Theme System ========== */
    function initThemes() {
        const grid = document.getElementById('theme-grid');
        const saved = localStorage.getItem('reader_theme') || '';
        if (saved) document.documentElement.setAttribute('data-theme', saved);
        const themes = [
            { name: '', cls: 'dot-lavender', label: 'Lavender' },
            { name: 'ocean', cls: 'dot-ocean', label: 'Ocean' },
            { name: 'forest', cls: 'dot-forest', label: 'Forest' },
            { name: 'sepia', cls: 'dot-sepia', label: 'Sepia' },
            { name: 'slate', cls: 'dot-slate', label: 'Slate' },
            { name: 'dark', cls: 'dot-dark', label: 'Dark' },
        ];
        themes.forEach(t => {
            const dot = document.createElement('button');
            dot.className = `theme-dot ${t.cls}${t.name === saved ? ' active' : ''}`;
            dot.title = t.label;
            dot.onclick = () => {
                if (t.name) document.documentElement.setAttribute('data-theme', t.name);
                else document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('reader_theme', t.name);
                grid.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
                dot.classList.add('active');
            };
            grid.appendChild(dot);
        });
    }

    /* ========== Keyboard Shortcuts ========== */
    document.addEventListener('keydown', (e) => {
        // Skip if typing in input/textarea
        if (e.target.matches('input, textarea, [contenteditable]')) return;

        switch(e.key) {
            case '+': case '=': e.preventDefault(); Zoom.adjust(10); break;
            case '-': e.preventDefault(); Zoom.adjust(-10); break;
            case '0': e.preventDefault(); Zoom.fitWidth(); break;
            case 'ArrowLeft': e.preventDefault(); viewer.scrollBy({ top: -viewer.clientHeight + 80, behavior: 'smooth' }); break;
            case 'ArrowRight': case ' ': e.preventDefault(); viewer.scrollBy({ top: viewer.clientHeight - 80, behavior: 'smooth' }); break;
            case 'ArrowUp': e.preventDefault(); viewer.scrollBy({ top: -120, behavior: 'smooth' }); break;
            case 'ArrowDown': e.preventDefault(); viewer.scrollBy({ top: 120, behavior: 'smooth' }); break;
            case 'Home': e.preventDefault(); viewer.scrollTo({ top: 0, behavior: 'smooth' }); break;
            case 'End': e.preventDefault(); viewer.scrollTo({ top: viewer.scrollHeight, behavior: 'smooth' }); break;
            case 'g': case 'G': e.preventDefault(); PageJump.activate(); break;
            case '/': case 'f': case 'F':
                if (!e.ctrlKey && !e.metaKey) { e.preventDefault(); togglePanel('search'); }
                break;
            case 'Escape':
                if (_activePanel) { document.getElementById({ settings: 'settings-panel', search: 'search-panel', notebook: 'notebook-panel' }[_activePanel]).style.display = 'none'; _activePanel = null; }
                document.getElementById('selection-toolbar').classList.remove('visible');
                document.getElementById('lookup-popup').classList.remove('visible');
                break;
        }
    });

    /* ========== Init ========== */
    Highlights.load();
    Bookmarks.load();
    initThemes();
    Sel.init();
    AI._restoreChat();
    init();

    // Desktop: collapse AI panel by default
    if (window.innerWidth > 768) {
        document.getElementById('toggle-right').classList.add('rotated');
    }
    // Desktop: open sidebar if outline exists
    if (window.innerWidth > 768 && OUTLINE.length > 0) {
        document.getElementById('sidebar').classList.remove('collapsed');
    }
    // Restore saved panel widths
    if (window.innerWidth > 768) {
        const savedSidebar = localStorage.getItem('pdf_sidebar_width');
        const savedPanels = localStorage.getItem('pdf_panels_width');
        if (savedSidebar) document.documentElement.style.setProperty('--sidebar-width', savedSidebar);
        if (savedPanels) document.documentElement.style.setProperty('--panels-width', savedPanels);
    }
</script>
</body>
</html>
